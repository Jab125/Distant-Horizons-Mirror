# 1.12.2 version
java_version=21
minecraft_version=1.12.2
parchment_version=
compatible_minecraft_versions=["1.12.2"]
accessWidenerVersion=
builds_for=cleanroom
embed_joml=true

# Netty
netty_version=4.2.9.Final

# LWJGL
lwjgl_version=3.3.6

# Fabric loader
fabric_loader_version=
fabric_api_version=
# Fabric mod versions
modmenu_version=
starlight_version_fabric=
phosphor_version_fabric=
lithium_version=
sodium_version=
iris_version=
bclib_version=
immersive_portals_version=
canvas_version=

# iris - needs 1.7.4+ to support the DH API
fabric_incompatibility_list={ "iris": "*" }
fabric_recommend_list={}

# Fabric mod run
# 0 = Don't enable and don't run
# 1 = Can be referenced in code but doesn't run
# 2 = Can be referenced in code and runs in client
enable_mod_menu=0
enable_starlight=0
enable_phosphor=0
enable_lithium=0
enable_sodium=0
enable_iris=0
# not available via github, use curse.maven if necessary
enable_bclib=0
enable_immersive_portals=0
enable_canvas=0

# Forge loader
forge_version=
# Neo not used but the variable still needs to be defined to make gradle happy
neoforge_version_range=[*,)

# Forge mod versions
terraforged_version=

# Forge mod run
# 0 = Don't enable and don't run
# 1 = Can be referenced in code but doesn't run
# 2 = Can be referenced in code and runs in client
enable_starlight_forge=0
enable_terraforged=0
enable_terrafirmacraft=0
